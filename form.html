<!-- Modal is inside this file at the bottom -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Nexus | Add Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Form to add a new contact" />
  <link rel="icon" type="image/png" href="#">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles/form.css" />
  <link rel="stylesheet" href="./styles/modal.css" />
  <script type="module" src="./scripts/form.js" defer></script>
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="main-header">

    <!-- Top row: App name + hamburger -->
    <div class="header-top">

      <!-- App name (links to home) -->
      <h1><a href="./index.html">Nexus</a></h1>

      <!-- Hamburger button (*JS-enhanced) -->
      <button id="mobile-drawer-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false"
        aria-controls="mobile-drawer">
        <!-- Hamburger icon (2 lines) -->
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>

    </div>

    <!-- ================= NAVIGATION DRAWER ================= -->
    <div id="mobile-drawer">
      <nav aria-label="Primary navigation">
        <h2>Navigate</h2>

        <!-- Page navigation -->
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="form.html">Add Contact</a></li>
        </ul>
      </nav>
    </div>

  </header>


  <!-- ================= MAIN CONTENT ================= -->
  <main>


    <!-- ================= ADD CONTACT FORM ================= -->
    <section aria-labelledby="add-contact-heading">

      <h2 id="add-contact-heading">Add New Contact</h2>

      <form id="contact-form">


        <!-- ================= WHO THEY ARE ================= -->
        <fieldset>

          <legend>Who They Are</legend>

          <div>
            <label for="first-name">*First Name</label>
            <input type="text" id="first-name" name="firstName" required minlength="2" maxlength="50"
              title="First name must be between 2 and 50 characters" autocomplete="given-name">
          </div>

          <div>
            <label for="last-name">*Last Name</label>
            <input type="text" id="last-name" name="lastName" required minlength="2" maxlength="50"
              title="Last name must be between 2 and 50 characters" autocomplete="family-name">
          </div>

          <div>
            <label for="title">*Title</label>
            <input type="text" id="title" name="title" required maxlength="100"
              title="Title must be no more than 100 characters" autocomplete="organization-title">
          </div>

          <div>
            <label for="organization">*Organization</label>
            <input type="text" id="organization" name="organization" required
              title="Organization must be no more than 100 characters" maxlength="100" autocomplete="organization">
          </div>

        </fieldset>


        <!-- ================= RELATIONSHIP ================= -->
        <fieldset>

          <legend>Relationship</legend>

          <div>
            <input type="checkbox" id="favorite" name="favorite">

            <label for="favorite">
              Favorite Contact
            </label>
          </div>

          <div>
            <label for="tag">*Tag Category</label>

            <select id="tag" name="tag" required title="Please select a tag category">
              <option value="">Select a tag...</option>
              <option value="friend">Friend</option>
              <option value="family">Family</option>
              <option value="work">Work</option>
              <option value="networking">Networking</option>
              <option value="other">Other</option>
            </select>
          </div>

        </fieldset>


        <!-- ================= HOW TO CONNECT ================= -->
        <fieldset>

          <legend>How to Connect</legend>

          <div>
            <label for="phone">*Phone</label>
            <input type="tel" id="phone" name="phone" required pattern="\d{3}-\d{3}-\d{4}" title="Format: 123-456-7890"
              autocomplete="tel">
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email">
          </div>

        </fieldset>


        <!-- ================= WHERE TO FIND THEM ================= -->
        <fieldset>

          <legend>Where to Find Them</legend>

          <div>
            <label for="street">Street</label>
            <input type="text" id="street" name="street" autocomplete="street-address">
          </div>

          <div>
            <label for="city">City</label>
            <input type="text" id="city" name="city" autocomplete="address-level2">
          </div>

          <div>
            <label for="state">State</label>
            <input type="text" id="state" name="state" autocomplete="address-level1">
          </div>

          <div>
            <label for="zip">ZIP Code</label>
            <input type="text" id="zip" name="zip" autocomplete="postal-code">
          </div>

        </fieldset>


        <!-- ================= ADD CONTEXT ================= -->
        <fieldset>

          <legend>Add Context</legend>

          <div>
            <label for="notes">Notes</label>

            <textarea id="notes" name="notes" rows="6"></textarea>
          </div>

        </fieldset>

        <p>* indicates a required field</p>

        <!-- ================= SUBMIT ================= -->
        <button type="submit">
          Save Contact
        </button>

      </form>

    </section>

    <!-- ================= MODAL ================= -->

    <div id="modal" class="modal" role="dialog" aria-labelledby="modal-title" aria-describedby="modal-description"
      aria-modal="true" aria-hidden="true">

      <section class="modal-content">

        <button type="button" id="close-modal" class="close-button" aria-label="Close dialog">
          &times;
        </button>

        <h2 id="modal-title"></h2>

        <p id="modal-description"></p>

      </section>
    </div>

  </main>

  <footer>
    <p>Nexus Contact Network</p>
  </footer>

</body>

</html>
